defaults:
  run:
    working-directory: ./crates/deadpool-postgres
env:
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: 1
jobs:
  check-integration:
    name: Check integration
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          components: rustc,rust-std,cargo
          toolchain: stable
      - run: cargo check --features ${{ matrix.feature }}
    strategy:
      fail-fast: false
      matrix:
        feature:
          - serde
          - rt_tokio_1
          - rt_async-std_1
        os:
          - ubuntu-latest
          - windows-2025
  check-integration-wasm:
    name: Check integration (WebAssembly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          components: rustc,rust-std,cargo
          targets: wasm32-unknown-unknown
          toolchain: stable
      - run: cargo check --no-default-features ${{ matrix.feature }} --target wasm32-unknown-unknown
    strategy:
      fail-fast: false
      matrix:
        feature:
          - --features rt_tokio_1
          - --features rt_tokio_1,serde
  check-reexported-features:
    name: Check re-exported features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          components: rustc,rust-std,cargo
          toolchain: stable
      - uses: dcarbone/install-jq-action@4fcb5062d7ce9bc4382d1a352d19ba3ba2c317c1 # v4.0.1
      - uses: dcarbone/install-yq-action@4075b4dca348d74bd83f2bf82d30f25d7c54539b # v1.3.1
      - run: ../../tools/check-reexported-features.sh
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          components: rustc,rust-std,cargo,clippy
          toolchain: stable
      - run: cargo clippy --no-deps --features serde,rt_tokio_1,rt_async-std_1 -- -D warnings
  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          components: rustc,rust-std,cargo
          toolchain: nightly
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          components: rustc,rust-std,cargo
          toolchain: "1.85"
      - run: ../../tools/cargo-update-minimal-versions.sh 1.85
      - run: cargo check --features serde,rt_tokio_1,rt_async-std_1
  rustdoc:
    name: Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          components: rustc,rust-std,cargo
          toolchain: stable
      - run: cargo doc --no-deps --features serde,rt_tokio_1,rt_async-std_1
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          components: rustc,rust-std,cargo,rustfmt
          toolchain: stable
      - run: cargo fmt --check
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        env:
          POSTGRES_DB: deadpool
          POSTGRES_PASSWORD: deadpool
          POSTGRES_USER: deadpool
        image: postgres:17-alpine
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          components: rustc,rust-std,cargo
          toolchain: stable
      - env:
          PG__DBNAME: deadpool
          PG__HOST: 127.0.0.1
          PG__PASSWORD: deadpool
          PG__PORT: 5432
          PG__USER: deadpool
        run: cargo test --features serde,rt_tokio_1,rt_async-std_1
name: deadpool-postgres
"on":
  pull_request:
    branches:
      - main
    paths:
      - crates/deadpool-postgres/**
      - .github/workflows/deadpool-postgres.yml
  push:
    branches:
      - main
    paths:
      - crates/deadpool-postgres/**
      - .github/workflows/deadpool-postgres.yml
    tags:
      - deadpool-postgres-v*
permissions: {}
